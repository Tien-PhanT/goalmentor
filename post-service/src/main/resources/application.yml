spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5432/goalmentor
    username: goalmentor
    password: goalmentor
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8083